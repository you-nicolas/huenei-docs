# Pre-commit configuration for Huenei Keycloak Migration DevSecOps
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        name: Validate YAML
        description: Ensures compose.yaml and azure-pipelines.yml are syntactically correct.
      - id: check-added-large-files

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        name: MarkdownLint
        description: Ensures documentation follows standard formatting rules.
        args: ["--fix"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
        name: Gitleaks (Secret Scanning)
        description: Prevents accidental commits of secrets (e.g., .env or hardcoded keys).
        entry: gitleaks protect --verbose --staged
